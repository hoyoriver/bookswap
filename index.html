<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교환독서</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#3d3530" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="bookswap" />
  <style>
    :root {
      --bg: #f7f5f2;
      --surface: #ffffff;
      --border: #e8e4e0;
      --text: #1a1a1a;
      --muted: #6b6460;
      --accent: #3d3530;
      --accent2: #6b5a4e;
      --green: #d4e8d4; --green-t: #3a6b3a;
      --blue: #d4dde8; --blue-t: #3a4f6b;
      --yellow: #fff3cd; --yellow-t: #856404;
      --red: #f8d7da; --red-t: #842029;
      --font: 'Inter', 'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }

    /* ── 레이아웃 ── */
    .app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

    /* ── 사이드바 ── */
    .sidebar {
      background: var(--accent);
      padding: 32px 0; position: sticky; top: 0; height: 100vh;
      display: flex; flex-direction: column;
    }
    .logo { padding: 0 24px 36px; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
    .nav-section { padding: 0 12px; flex: 1; }
    .nav-label { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: rgba(255,255,255,.35); padding: 0 12px; margin-bottom: 4px; margin-top: 20px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: rgba(255,255,255,.55); font-size: 13.5px; transition: all .15s; user-select: none; }
    .nav-item:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.9); }
    .nav-item.active { background: rgba(255,255,255,.14); color: #fff; font-weight: 600; }
    .nav-item .icon { font-size: 15px; width: 20px; text-align: center; }
    .nav-count { margin-left: auto; background: rgba(255,255,255,.18); border-radius: 10px; padding: 1px 7px; font-size: 11px; color: rgba(255,255,255,.7); }
    .nav-item.active .nav-count { background: rgba(255,255,255,.25); color: #fff; }

    /* ── 메인 ── */
    .main-wrapper { display: flex; flex-direction: column; min-height: 100vh; }
    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: var(--surface); border-bottom: 1px solid var(--border);
      height: 60px; display: flex; align-items: center; padding: 0 40px;
      justify-content: space-between;
    }
    .topbar-title { font-size: 17px; font-weight: 700; letter-spacing: -.3px; color: var(--text); }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .main { padding: 36px 40px; flex: 1; }
    .page { display: none; }
    .page.active { display: block; }
    .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
    .page-title { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
    .page-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* ── 버튼 ── */
    .btn { background: var(--accent); color: #fff; border: none; padding: 9px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: var(--font); transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); color: var(--text); opacity: 1; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-danger { background: #c0392b; }

    /* ── 홈 카드 ── */
    .home-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .moim-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px 24px; cursor: pointer; transition: all .15s;
    }
    .moim-card:hover { border-color: var(--accent2); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.07); }
    .moim-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .moim-card-name { font-size: 16px; font-weight: 700; letter-spacing: -.3px; margin-top: 4px; }
    .dday-badge { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 7px; white-space: nowrap; }
    .dday-soon { background: #e85d4a; color: #fff; }
    .dday-normal { background: #f5c842; color: #1a1a1a; }
    .dday-ok { background: #4caf82; color: #fff; }
    .moim-card-meta { display: flex; gap: 16px; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .meta-item { font-size: 12.5px; color: var(--muted); }
    .meta-item strong { color: var(--text); font-weight: 600; }
    .member-book-list { display: flex; flex-direction: column; gap: 6px; }
    .member-book-row { display: flex; align-items: center; justify-content: space-between; }
    .member-name-sm { font-size: 12.5px; font-weight: 500; }
    .book-chip { font-size: 11.5px; color: var(--muted); background: var(--bg); padding: 3px 9px; border-radius: 6px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── 모임 목록 ── */
    .moim-list { display: flex; flex-direction: column; gap: 12px; }
    .moim-list-item {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px 24px; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 16px;
      cursor: pointer; transition: all .15s;
    }
    .moim-list-item:hover { border-color: var(--accent); }
    .moim-list-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .moim-list-meta { font-size: 12.5px; color: var(--muted); }
    .status-badge { font-size: 11.5px; padding: 4px 10px; border-radius: 6px; font-weight: 500; }
    .status-진행중 { background: var(--green); color: var(--green-t); }
    .status-완료 { background: var(--blue); color: var(--blue-t); }

    /* ── 필터 바 ── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-chip { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-size: 12.5px; cursor: pointer; color: var(--muted); transition: all .15s; }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── 모임 상세 ── */
    .detail-back { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; cursor: pointer; margin-bottom: 24px; }
    .detail-back:hover { color: var(--text); }
    .detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
    .detail-title { font-size: 24px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 6px; }

    .detail-info-row { display: flex; gap: 24px; flex-wrap: wrap; }
    .detail-info-item { font-size: 13px; color: var(--muted); }
    .detail-info-item strong { color: var(--text); }

    .section-title { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 14px; margin-top: 32px; }

    /* 순환 시각화 */
    .cycle-visual { display: flex; align-items: center; gap: 0; flex-wrap: wrap; gap: 4px; }
    .cycle-node {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px; text-align: center; min-width: 80px;
    }
    .cycle-node.active-node { border-color: var(--accent); background: var(--accent); color: #fff; }
    .cycle-node-name { font-size: 12.5px; font-weight: 600; }
    .cycle-node-book { font-size: 11px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
    .cycle-node.active-node .cycle-node-book { color: rgba(255,255,255,.7); }
    .cycle-arrow { font-size: 18px; color: var(--muted); }

    /* 멤버-책 테이블 */
    .holder-table { width: 100%; border-collapse: collapse; }
    .holder-table th { font-size: 11.5px; color: var(--muted); font-weight: 600; text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .holder-table td { font-size: 13.5px; padding: 12px 12px; border-bottom: 1px solid var(--bg); }
    .holder-table tr:last-child td { border-bottom: none; }
    .holder-table tr:hover td { background: var(--bg); }

    /* 교환 이력 */
    .exchange-log { display: flex; flex-direction: column; gap: 8px; }
    .log-item { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 10px 14px; background: var(--surface); border-radius: 8px; }
    .log-date { color: var(--muted); font-size: 12px; min-width: 80px; }
    .log-arrow { color: var(--muted); }

    /* ── 내 기록 ── */
    .my-books-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
    .my-book-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .my-book-cover { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
    .my-book-cover-empty { width: 100%; aspect-ratio: 2/3; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 32px; }
    .my-book-info { padding: 12px; }
    .my-book-title { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .my-book-author { font-size: 12px; color: var(--muted); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .my-book-moim-tag { font-size: 11px; color: var(--muted); background: var(--bg); padding: 2px 7px; border-radius: 5px; display: inline-block; }

    /* ── 통계 ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .stat-num { font-size: 28px; font-weight: 700; letter-spacing: -1px; margin-bottom: 4px; }
    .stat-label { font-size: 12.5px; color: var(--muted); }
    .moim-stat-list { display: flex; flex-direction: column; gap: 10px; }
    .moim-stat-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    .moim-stat-name { font-size: 13.5px; font-weight: 600; margin-bottom: 3px; }
    .moim-stat-sub { font-size: 12px; color: var(--muted); }
    .moim-stat-nums { display: flex; gap: 20px; }
    .stat-mini { text-align: center; }
    .stat-mini-num { font-size: 18px; font-weight: 700; }
    .stat-mini-label { font-size: 11px; color: var(--muted); }

    /* ── 감상 메모 ── */
    .memo-book-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .memo-book-tab { padding:5px 14px; border-radius:20px; border:1px solid var(--border); background:var(--surface); font-size:12.5px; cursor:pointer; color:var(--muted); transition:all .15s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px; }
    .memo-book-tab:hover { border-color:var(--accent); color:var(--accent); }
    .memo-book-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .memo-list { display:flex; flex-direction:column; gap:12px; margin-bottom:20px; min-height:40px; }
    .memo-item { display:flex; gap:12px; }
    .memo-avatar { width:32px; height:32px; border-radius:50%; background:var(--accent); color:#fff; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
    .memo-bubble { flex:1; background:var(--bg); border-radius:10px; padding:10px 14px; }
    .memo-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .memo-name { font-size:13px; font-weight:600; }
    .memo-date { font-size:11.5px; color:var(--muted); }
    .memo-del { margin-left:auto; font-size:11.5px; color:var(--muted); cursor:pointer; padding:2px 7px; border-radius:4px; transition:all .12s; }
    .memo-del:hover { color:#c0392b; background:#fdf0f0; }
    .memo-text { font-size:13.5px; line-height:1.65; color:var(--text); white-space:pre-wrap; word-break:break-word; }
    .memo-empty { color:var(--muted); font-size:13px; padding:20px 0; text-align:center; }
    .memo-who { font-size:12.5px; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
    .memo-who select { font-size:12.5px; padding:4px 8px; border:1px solid var(--border); border-radius:6px; font-family:var(--font); outline:none; background:var(--surface); color:var(--text); cursor:pointer; }
    .memo-who select:focus { border-color:var(--accent); }
    .memo-input-row { display:flex; gap:8px; align-items:flex-end; }
    .memo-textarea { flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:10px; font-family:var(--font); font-size:13.5px; resize:none; outline:none; line-height:1.5; min-height:64px; transition:border-color .15s; }
    .memo-textarea:focus { border-color:var(--accent); }

    /* ── 빈 상태 ── */
    .empty-state { text-align: center; padding: 80px 0; color: var(--muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { margin-bottom: 20px; line-height: 1.6; }

    /* ── 모달 ── */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100; align-items: center; justify-content: center; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--surface); border-radius: 16px; padding: 32px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    .form-label { font-size: 12.5px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: block; }
    .form-input, .form-select { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--font); font-size: 13.5px; color: var(--text); background: var(--surface); outline: none; transition: border-color .15s; }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }
    .input-with-btn { display: flex; gap: 8px; }
    .input-with-btn .form-input { flex: 1; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag-item { display: flex; align-items: center; gap: 5px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 12.5px; }
    .tag-remove { cursor: pointer; color: var(--muted); font-size: 14px; line-height: 1; }
    .tag-remove:hover { color: #c0392b; }
    .cycle-input-row { display: flex; align-items: center; gap: 8px; }
    .cycle-input-row .form-input { width: 80px; text-align: center; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }

    /* ── 교환 실행 모달 ── */
    .exchange-form-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 13.5px; }
    .exchange-form-row select { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--font); font-size: 13px; outline: none; }
    .exchange-form-row select:focus { border-color: var(--accent); }

    /* ── 책 검색 드롭다운 ── */
    .book-search-wrap { position: relative; }
    .book-search-results {
      display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.1); z-index: 200; max-height: 280px; overflow-y: auto;
    }
    .book-search-results.open { display: block; }
    .book-result-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      cursor: pointer; transition: background .12s; border-bottom: 1px solid var(--bg);
    }
    .book-result-item:last-child { border-bottom: none; }
    .book-result-item:hover { background: var(--bg); }
    .book-result-thumb {
      width: 36px; height: 52px; object-fit: cover; border-radius: 4px;
      background: var(--bg); flex-shrink: 0;
    }
    .book-result-thumb-empty { width: 36px; height: 52px; background: var(--bg); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .book-result-info { flex: 1; min-width: 0; }
    .book-result-title { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .book-result-author { font-size: 11.5px; color: var(--muted); }
    .book-search-status { padding: 14px; text-align: center; font-size: 12.5px; color: var(--muted); }

    /* 태그 아이템에 썸네일 */
    .tag-thumb { width: 20px; height: 28px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }

    /* ── 초대 코드 ── */
    .invite-box {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      background: var(--bg); border-radius: 12px; padding: 16px 20px;
    }
    .invite-code-display {
      font-size: 28px; font-weight: 800; letter-spacing: 6px; color: var(--accent);
    }
    .invite-actions { display: flex; gap: 8px; margin-left: auto; }

    /* ── 교환 알림 배너 ── */
    .rotation-banner {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
      background: #fff8e6; border: 1px solid #f5c842; border-radius: 12px;
      padding: 14px 20px; margin-bottom: 24px;
    }
    .rotation-banner-text { font-size: 14px; font-weight: 600; color: #5a4300; }
    .rotation-banner-sub { font-size: 12px; color: #7a6020; margin-top: 2px; }

    /* ── 순서 수정 모달 ── */
    .order-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px;
    }
    .order-num { font-size: 13px; font-weight: 700; color: var(--muted); min-width: 20px; text-align: center; }
    .order-arrow { font-size: 12px; color: var(--muted); margin: 0 4px; }
    .order-name { flex: 1; font-size: 14px; font-weight: 500; }
    .order-btns { display: flex; gap: 4px; }
    .order-btn {
      width: 28px; height: 28px; border: 1px solid var(--border); background: var(--surface);
      border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center;
      justify-content: center; transition: all .12s; color: var(--text);
    }
    .order-btn:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
    .order-btn:disabled { opacity: .3; cursor: default; }
    .order-hint { font-size: 12px; color: var(--muted); margin-bottom: 14px; }

    /* ── 모바일 탭바 ── */
    .mobile-tabbar {
      display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: var(--surface); border-top: 1px solid var(--border);
      height: 64px; padding: 0 8px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .mobile-tabbar-inner { display: flex; height: 100%; }
    .tab-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; cursor: pointer; color: var(--muted); font-size: 10px; transition: color .15s;
      border-radius: 8px; padding: 6px 4px;
    }
    .tab-item:hover { color: var(--accent); }
    .tab-item.active { color: var(--accent); }
    .tab-item.active .tab-label { font-weight: 700; }
    .tab-icon { font-size: 20px; line-height: 1; }
    .tab-label { font-size: 10px; }

    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main { padding: 20px 16px 88px; }
      .topbar { padding: 0 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .my-books-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .mobile-tabbar { display: block; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="logo">교환독서</div>
    <nav class="nav-section">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── Supabase 설정 ────────────────────────────────────────
// Supabase 프로젝트에서 발급받은 값으로 교체하세요
const SUPABASE_URL = 'https://fyvapryghnhhlqeirtdt.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_oEs_wtT0rb_M-1JmL__a4w_U-y3PGlz';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── 데이터 ──────────────────────────────────────────────
let moims = [];
let moimFilter = 'all';
let joiningMoim = null;

// 내가 속한 모임 ID 관리 (localStorage)
const MyMoims = {
  get() { try { return JSON.parse(localStorage.getItem('bs_my_moims') || '[]'); } catch { return []; } },
  add(id) { const ids = this.get(); if (!ids.includes(id)) { ids.push(id); localStorage.setItem('bs_my_moims', JSON.stringify(ids)); } },
  has(id) { return this.get().includes(id); }
};

// 모임별 내 멤버 ID 관리 (localStorage) — 삭제 권한 체크용
const MyMember = {
  getAll() { try { return JSON.parse(localStorage.getItem('bs_my_members') || '{}'); } catch { return {}; } },
  get(moimId) { return this.getAll()[moimId] || null; },
  set(moimId, memberId) { const m = this.getAll(); m[moimId] = memberId; localStorage.setItem('bs_my_members', JSON.stringify(m)); }
};


async function loadMoims() {
  const myIds = MyMoims.get();
  if (!myIds.length) { moims = []; return; }
  const { data, error } = await sb.from('moims').select('data').in('id', myIds).order('created_at', { ascending: false });
  if (error) { console.error(error); return; }
  moims = (data || []).map(r => r.data);
}

async function findMoimByCode(code) {
  const { data } = await sb.from('moims').select('data');
  const all = (data || []).map(r => r.data);
  return all.find(m => m.inviteCode === code.toUpperCase()) || null;
}

async function upsertMoim(moim) {
  const { error } = await sb.from('moims').upsert({ id: moim.id, data: moim });
  if (error) console.error(error);
}

async function deleteMoimById(id) {
  const { error } = await sb.from('moims').delete().eq('id', id);
  if (error) console.error(error);
  moims = moims.filter(m => m.id !== id);
}

// 임시 상태 (모달용)
let tmpMembers = [];
let tmpBooks = [];
let currentMoimId = null;
let activeMemoBookId = null;

// ── 네비게이션 ───────────────────────────────────────────
const PAGE_META = {
  home:    { title: '홈',    tab: 'tab-home' },
  moim:    { title: '모임',  tab: 'tab-moim' },
  detail:  { title: '모임 상세', tab: 'tab-moim' },
  mybooks: { title: '내 기록', tab: 'tab-mybooks' },
  stats:   { title: '통계',  tab: 'tab-stats' },
};

function navigate(page, moimId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const navEl = document.querySelector(`[onclick="navigate('${page}')"]`);
  if (navEl) navEl.classList.add('active');

  // 탑바 타이틀
  const meta = PAGE_META[page] || {};
  const titleEl = document.getElementById('topbar-title');
  if (titleEl) titleEl.textContent = meta.title || '';


  // 모바일 탭바 활성화
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  if (meta.tab) {
    const tabEl = document.getElementById(meta.tab);
    if (tabEl) tabEl.classList.add('active');
  }

  if (page === 'home') renderHome();
  if (page === 'moim') renderMoimList();
  if (page === 'detail' && moimId) renderDetail(moimId);
  if (page === 'mybooks') renderMyBooks();
  if (page === 'stats') renderStats();

  document.getElementById('cnt-moim').textContent = moims.filter(m => m.status === '진행중').length;
}

// ── 홈 ──────────────────────────────────────────────────
function renderHome() {
  const grid = document.getElementById('home-grid');
  const active = moims.filter(m => m.status === '진행중');
  if (!active.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">👥</div>
      <p>진행 중인 모임이 없어요.<br>첫 번째 모임을 만들어 보세요!</p>
      <button class="btn" onclick="openCreateMoim()">+ 모임 만들기</button>
    </div>`;
    return;
  }
  grid.innerHTML = active.map(m => {
    const dday = nextExchangeDday(m);
    const ddayClass = dday.n <= 2 ? 'dday-soon' : dday.n <= 5 ? 'dday-normal' : 'dday-ok';
    const memberRows = m.members.map(mem => {
      const bookId = m.currentHolder ? Object.keys(m.currentHolder).find(bid => m.currentHolder[bid] === mem.id) : null;
      const book = bookId ? m.books.find(b => b.id === bookId) : null;
      return `<div class="member-book-row">
        <span class="member-name-sm">${esc(mem.name)}</span>
        <span class="book-chip">${book ? esc(book.title) : '—'}</span>
      </div>`;
    }).join('');
    return `<div class="moim-card" onclick="navigate('detail','${m.id}')">
      <div class="moim-card-header">
        <div class="moim-card-name">${esc(m.name)}</div>
        <span class="dday-badge ${ddayClass}">${dday.label}</span>
      </div>
      <div class="moim-card-meta">
        <div class="meta-item"><strong>${m.members.length}</strong>명</div>
        <div class="meta-item"><strong>${m.books.length}</strong>권</div>
        <div class="meta-item">주기 <strong>${m.cycleDays}</strong>일</div>
      </div>
      <div class="member-book-list">${memberRows}</div>
    </div>`;
  }).join('');
}

// ── 모임 목록 ────────────────────────────────────────────
function renderMoimList(filter) {
  if (filter !== undefined) moimFilter = filter;
  const list = document.getElementById('moim-list');
  let items = moimFilter === 'all' ? moims : moims.filter(m => m.status === moimFilter);
  document.getElementById('cnt-moim').textContent = moims.filter(m => m.status === '진행중').length;
  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">👥</div><p>모임이 없어요.</p></div>`;
    return;
  }
  list.innerHTML = items.map(m => `
    <div class="moim-list-item" onclick="navigate('detail','${m.id}')">
      <div>
        <div class="moim-list-name">${esc(m.name)}</div>
        <div class="moim-list-meta">${m.members.length}명 · ${m.books.length}권 · ${m.cycleDays}일 주기 · ${fmtDate(m.startDate)} 시작</div>
      </div>
      <span class="status-badge status-${m.status}">${m.status}</span>
    </div>`).join('');
}

function filterMoim(f, el) {
  document.querySelectorAll('#page-moim .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderMoimList(f);
}

// ── 모임 상세 ────────────────────────────────────────────
function renderDetail(moimId) {
  currentMoimId = moimId;
  const m = moims.find(x => x.id === moimId);
  if (!m) return;

  const titleEl = document.getElementById('topbar-title');
  if (titleEl) titleEl.textContent = m.name;

  const dday = nextExchangeDday(m);
  const ddayClass = dday.n <= 2 ? 'dday-soon' : dday.n <= 5 ? 'dday-normal' : 'dday-ok';

  // 순환 시각화
  const cycleNodes = m.members.map((mem, i) => {
    const bookId = m.currentHolder ? Object.keys(m.currentHolder).find(bid => m.currentHolder[bid] === mem.id) : null;
    const book = bookId ? m.books.find(b => b.id === bookId) : null;
    return `<div class="cycle-node">
      <div class="cycle-node-name">${esc(mem.name)}</div>
      <div class="cycle-node-book">${book ? esc(book.title) : '—'}</div>
    </div>${i < m.members.length - 1 ? '<span class="cycle-arrow">→</span>' : '<span class="cycle-arrow" style="color:var(--accent)">↩</span>'}`;
  }).join('');

  // 멤버-책 현황 테이블
  const holderRows = m.members.map(mem => {
    const bookIds = m.currentHolder ? Object.keys(m.currentHolder).filter(bid => m.currentHolder[bid] === mem.id) : [];
    const bookTitles = bookIds.map(bid => { const b = m.books.find(x => x.id === bid); return b ? esc(b.title) : ''; }).filter(Boolean);
    return `<tr>
      <td style="font-weight:500">${esc(mem.name)}</td>
      <td>${bookTitles.length ? bookTitles.join(', ') : '<span style="color:var(--muted)">없음</span>'}</td>
    </tr>`;
  }).join('');

  // 교환 이력
  const logs = (m.exchanges || []).slice().reverse().slice(0, 10).map(e => {
    const from = m.members.find(x => x.id === e.fromId);
    const to = m.members.find(x => x.id === e.toId);
    const book = m.books.find(x => x.id === e.bookId);
    return `<div class="log-item">
      <span class="log-date">${e.date}</span>
      <span style="font-weight:500">${esc(book ? book.title : '?')}</span>
      <span class="log-arrow">·</span>
      <span>${esc(from ? from.name : '?')} → ${esc(to ? to.name : '?')}</span>
    </div>`;
  }).join('') || '<div style="color:var(--muted);font-size:13px;padding:8px 0">아직 교환 이력이 없어요</div>';

  // 책 목록
  const bookList = m.books.map(b => {
    const holderId = m.currentHolder ? m.currentHolder[b.id] : null;
    const holder = holderId ? m.members.find(x => x.id === holderId) : null;
    return `<tr>
      <td style="font-weight:500">${esc(b.title)}</td>
      <td>${holder ? esc(holder.name) : '<span style="color:var(--muted)">미배정</span>'}</td>
      <td style="text-align:right;padding-right:12px">
        <button class="btn btn-sm btn-ghost" onclick="openEditBookModal('${m.id}','${b.id}')">수정</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-title">${esc(m.name)}</div>
        <div class="detail-info-row">
          <div class="detail-info-item"><strong>${m.members.length}</strong>명</div>
          <div class="detail-info-item"><strong>${m.books.length}</strong>권</div>
          <div class="detail-info-item">교환 주기 <strong>${m.cycleDays}일</strong></div>

function openCreateMoim() {
  tmpBooks = [];
  tmpSelectedBook = null;
  document.getElementById('m-name').value = '';
  document.getElementById('m-my-name').value = '';
  document.getElementById('m-cycle').value = '14';
  document.getElementById('m-book-input').value = '';
  document.getElementById('m-book-results').classList.remove('open');
  document.getElementById('m-start').value = todayStr();
  document.getElementById('m-book-list').innerHTML = '';

}

function addBookToMoim() {
  if (!tmpSelectedBook) return;
  tmpBooks.push({ id: uid(), ...tmpSelectedBook });
  tmpSelectedBook = null;
  document.getElementById('m-book-input').value = '';
  document.getElementById('m-book-results').classList.remove('open');
  renderTmpTags('m-book-list', tmpBooks, 'book');
}

function renderTmpTags(containerId, arr, type) {
  document.getElementById(containerId).innerHTML = arr.map(item => `
    <div class="tag-item">
      ${item.cover ? `<img class="tag-thumb" src="${item.cover}" alt="" />` : ''}
      ${esc(item.name || item.title)}
      <span class="tag-remove" onclick="removeTag('${item.id}','${type}')">×</span>
    </div>`).join('');
}

function removeTag(id, type) {
  if (type === 'member') tmpMembers = tmpMembers.filter(m => m.id !== id);
  else tmpBooks = tmpBooks.filter(b => b.id !== id);
  renderTmpTags(type === 'member' ? 'm-member-list' : 'm-book-list',
    type === 'member' ? tmpMembers : tmpBooks, type);
}

async function saveMoim() {
  const name = document.getElementById('m-name').value.trim();
  const myName = document.getElementById('m-my-name').value.trim();
  if (!name) { alert('모임 이름을 입력해주세요'); return; }
  if (!myName) { alert('내 이름을 입력해주세요'); return; }
  if (tmpBooks.length < 1) { alert('책을 1권 이상 추가해주세요'); return; }

  const cycle = parseInt(document.getElementById('m-cycle').value) || 14;
  const startDate = document.getElementById('m-start').value || todayStr();
  const creator = { id: uid(), name: myName };

  // 첫 번째 책은 생성자에게 배정, 나머지는 미배정
  const currentHolder = {};
  if (tmpBooks.length > 0) currentHolder[tmpBooks[0].id] = creator.id;

  const moim = {
    id: uid(),
    name,
    maxCount: parseInt(document.getElementById('m-maxcount').value),
    cycleDays: cycle,
    startDate,
    lastExchangeDate: startDate,
    members: [creator],
    books: tmpBooks,
    currentHolder,
    exchanges: [],
    status: '진행중',
    createdAt: new Date().toISOString(),
    inviteCode: generateCode()
  };

  await upsertMoim(moim);
  moims.unshift(moim);
  MyMoims.add(moim.id);
  MyMember.set(moim.id, creator.id);
  closeModal('modal-create-moim');
  navigate('detail', moim.id);
}

async function confirmExchange() {
  const m = moims.find(x => x.id === currentMoimId);

  const fromId = document.getElementById('ex-from').value;

// ── 자동 순환 ────────────────────────────────────────────
async function triggerAutoRotate(moimId) {
  const m = moims.find(x => x.id === moimId);
  if (!m) return;
  if (!confirm(`"${m.name}" 모임의 책을 순서대로 순환할까요?`)) return;

  const today = todayStr();
  const members = m.members;
  if (!m.currentHolder) m.currentHolder = {};

  // 각 멤버가 가진 책 → 다음 멤버에게 이동 (circular)
  const newHolder = {};
  members.forEach((mem, i) => {
    const nextMem = members[(i + 1) % members.length];
    Object.entries(m.currentHolder).forEach(([bookId, holderId]) => {
      if (holderId === mem.id) {
        newHolder[bookId] = nextMem.id;
        if (!m.exchanges) m.exchanges = [];
        m.exchanges.push({ bookId, fromId: mem.id, toId: nextMem.id, date: today });
      }
    });
  });

  // 미배정 책은 첫 번째 멤버에게
  m.books.forEach(b => {
    if (!m.currentHolder[b.id] && !newHolder[b.id]) {
      newHolder[b.id] = members[0]?.id;
    }
  });

  m.currentHolder = { ...m.currentHolder, ...newHolder };
  m.lastExchangeDate = today;

  await upsertMoim(m);
  renderDetail(moimId);
  toast('✅ 순환 처리 완료!');
}

let tmpOrderMembers = [];

function openOrderModal(moimId) {
  currentMoimId = moimId;
  const m = moims.find(x => x.id === moimId);
  if (!m) return;
  tmpOrderMembers = m.members.map(mem => ({ ...mem }));
  renderOrderList();
  openModal('modal-order');
}

function renderOrderList() {
  const last = tmpOrderMembers.length - 1;
  document.getElementById('order-list').innerHTML = tmpOrderMembers.map((mem, i) => `
    <div class="order-item">
      <span class="order-num">${i + 1}</span>
      <span class="order-name">${esc(mem.name)}</span>
      ${i < last ? `<span class="order-arrow">→</span>` : `<span class="order-arrow" style="color:var(--accent)">↩</span>`}
      <div class="order-btns">
        <button class="order-btn" onclick="moveOrder(${i},-1)" ${i === 0 ? 'disabled' : ''}>↑</button>
        <button class="order-btn" onclick="moveOrder(${i},1)" ${i === last ? 'disabled' : ''}>↓</button>
      </div>
    </div>`).join('');
}

function moveOrder(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= tmpOrderMembers.length) return;
  [tmpOrderMembers[i], tmpOrderMembers[j]] = [tmpOrderMembers[j], tmpOrderMembers[i]];
  renderOrderList();
}

async function saveOrder() {
  const m = moims.find(x => x.id === currentMoimId);
  if (!m) return;
  m.members = tmpOrderMembers;
  await upsertMoim(m);
  closeModal('modal-order');
  renderDetail(currentMoimId);
  toast('순서가 저장됐어요');
}

let editingBookId = null;

function openEditBookModal(moimId, bookId) {
  currentMoimId = moimId;
  editingBookId = bookId;
  const m = moims.find(x => x.id === moimId);
  if (!m) return;

  if (!book) return;

  tmpSelectedBook = null;
  document.getElementById('eb-title').value = '';
  document.getElementById('eb-results').classList.remove('open');
  const sel = document.getElementById('eb-selected');
  sel.style.display = 'none';
  sel.innerHTML = '';
  document.getElementById('edit-book-modal-title').textContent = `"${book.title}" 수정`;

  const currentHolderId = m.currentHolder?.[bookId] || '';
  document.getElementById('eb-holder').innerHTML =
    `<option value="">미배정</option>` +
    m.members.map(mem =>
      `<option value="${mem.id}" ${mem.id === currentHolderId ? 'selected' : ''}>${esc(mem.name)}</option>`
    ).join('');

  openModal('modal-edit-book');
}

async function saveEditBook() {
  const m = moims.find(x => x.id === currentMoimId);
  if (!m) return;

  if (tmpSelectedBook) {
    const idx = m.books.findIndex(b => b.id === editingBookId);
    if (idx !== -1) m.books[idx] = { id: editingBookId, ...tmpSelectedBook };
  }

  if (!m.currentHolder) m.currentHolder = {};
  const holderId = document.getElementById('eb-holder').value;
  if (holderId) {
    m.currentHolder[editingBookId] = holderId;
  } else {
    delete m.currentHolder[editingBookId];
  }

  await upsertMoim(m);
  closeModal('modal-edit-book');
  renderDetail(currentMoimId);
}

// ── 책 감상 메모 ─────────────────────────────────────────
function renderMemoHTML(m) {
  if (!m.books.length) return '';

  // 활성 탭 초기화
  if (!activeMemoBookId || !m.books.find(b => b.id === activeMemoBookId)) {
    activeMemoBookId = m.books[0].id;
  }

  const tabs = m.books.map(b => `
    <div class="memo-book-tab ${b.id === activeMemoBookId ? 'active' : ''}"
      onclick="switchMemoBook('${m.id}','${b.id}')">
      ${esc(b.title)}
    </div>`).join('');

  const memos = (m.memos?.[activeMemoBookId]) || [];
  const myMemberId = MyMember.get(m.id);
  const myMember = myMemberId ? m.members.find(x => x.id === myMemberId) : null;

  const memoItems = memos.length
    ? memos.slice().reverse().map(memo => `
      <div class="memo-item">
        <div class="memo-avatar">${esc(memo.memberName?.[0] || '?')}</div>
        <div class="memo-bubble">
          <div class="memo-header">
            <span class="memo-name">${esc(memo.memberName)}</span>
            <span class="memo-date">${fmtDate(memo.date)}</span>
            ${memo.memberId === myMemberId
              ? `<span class="memo-del" onclick="deleteMemo('${m.id}','${activeMemoBookId}','${memo.id}')">삭제</span>`
              : ''}
          </div>
          <div class="memo-text">${esc(memo.text)}</div>
        </div>
      </div>`).join('')
    : '<div class="memo-empty">아직 감상 메모가 없어요. 첫 번째로 남겨보세요!</div>';

  const whoLine = myMember
    ? `<div class="memo-who"><span>${esc(myMember.name)}</span>으로 작성</div>`
    : `<div class="memo-who">나는
        <select onchange="setMyIdentity('${m.id}',this.value)">
          <option value="">— 선택 —</option>
          ${m.members.map(mem => `<option value="${mem.id}">${esc(mem.name)}</option>`).join('')}
        </select>
      </div>`;

  return `
    <div class="section-title" style="margin-top:32px">책 감상 메모</div>
    <div class="memo-book-tabs">${tabs}</div>
    <div class="memo-list">${memoItems}</div>
    ${whoLine}
    <div class="memo-input-row">
      <textarea class="memo-textarea" id="memo-input"
        placeholder="감상을 자유롭게 남겨보세요... (Cmd+Enter로 등록)"
        onkeydown="if(event.key==='Enter'&&(event.metaKey||event.ctrlKey))submitMemo('${m.id}','${activeMemoBookId}')"></textarea>
      <button class="btn btn-sm" onclick="submitMemo('${m.id}','${activeMemoBookId}')">등록</button>
    </div>`;
}

function switchMemoBook(moimId, bookId) {
  activeMemoBookId = bookId;
  renderDetail(moimId);
  setTimeout(() => document.querySelector('.memo-list')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}


async function submitMemo(moimId, bookId) {
  const m = moims.find(x => x.id === moimId);
  if (!m) return;
  const myMemberId = MyMember.get(moimId);
  if (!myMemberId) { toast('먼저 내 이름을 선택해주세요'); return; }
  const myMember = m.members.find(x => x.id === myMemberId);
  if (!myMember) return;

  const text = document.getElementById('memo-input')?.value.trim();
  if (!text) { toast('내용을 입력해주세요'); return; }

  if (!m.memos) m.memos = {};
  if (!m.memos[bookId]) m.memos[bookId] = [];
  m.memos[bookId].push({
    id: uid(),
    memberId: myMemberId,
    memberName: myMember.name,
    text,
    date: todayStr()
  });

  await upsertMoim(m);
  renderDetail(moimId);
  toast('메모가 등록됐어요!');
}

function setMyIdentity(moimId, memberId) {
  if (!memberId) return;
  MyMember.set(moimId, memberId);
  renderDetail(moimId);
}

async function deleteMemo(moimId, bookId, memoId) {
  const m = moims.find(x => x.id === moimId);
  if (!m?.memos?.[bookId]) return;
  m.memos[bookId] = m.memos[bookId].filter(memo => memo.id !== memoId);
  await upsertMoim(m);
  renderDetail(moimId);
}

  moims.forEach(m => {
    m.books.forEach(b => allBooks.push({ ...b, moimName: m.name, moimId: m.id, moimStatus: m.status }));
  });

  if (!allBooks.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📖</div><p>아직 기록된 책이 없어요</p></div>`;

          <span class="my-book-moim-tag">${esc(b.moimName)}</span>

      </div>`).join('')}

  el.innerHTML = chips + grid;

function renderStats() {
  const el = document.getElementById('stats-content');

  const totalBooks = moims.reduce((s, m) => s + m.books.length, 0);
  const totalEx = moims.reduce((s, m) => s + (m.exchanges || []).length, 0);

  const moimRows = moims.map(m => `
    <div class="moim-stat-item">
      <div>
        <div class="moim-stat-name">${esc(m.name)}</div>
        <div class="moim-stat-sub">${m.cycleDays}일 주기 · ${fmtDate(m.startDate)} 시작</div>
      </div>
      <div class="moim-stat-nums">
        <div class="stat-mini"><div class="stat-mini-num">${m.members.length}</div><div class="stat-mini-label">멤버</div></div>
        <div class="stat-mini"><div class="stat-mini-num">${m.books.length}</div><div class="stat-mini-label">책</div></div>
        <div class="stat-mini"><div class="stat-mini-num">${(m.exchanges||[]).length}</div><div class="stat-mini-label">교환</div></div>
      </div>
    </div>`).join('') || '<div style="color:var(--muted);font-size:13px">아직 모임이 없어요</div>';

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${totalMoims}</div><div class="stat-label">전체 모임</div></div>
      <div class="stat-card"><div class="stat-num">${activeMoims}</div><div class="stat-label">진행 중</div></div>
      <div class="stat-card"><div class="stat-num">${totalBooks}</div><div class="stat-label">총 등록 도서</div></div>
      <div class="stat-card"><div class="stat-num">${totalEx}</div><div class="stat-label">총 교환 횟수</div></div>
    </div>
    <div class="section-title" style="margin-top:0">모임별 현황</div>
    <div class="moim-stat-list">${moimRows}</div>
  `;
}

// ── 초대 코드 ────────────────────────────────────────────
function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => toast('코드 복사됨!'));
}

function copyInviteLink(code) {
  const url = `${location.origin}?join=${code}`;
  navigator.clipboard.writeText(url).then(() => toast('초대 링크 복사됨!'));
}

function toast(msg) {
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:999;opacity:1;transition:opacity .4s';
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }, 1800);
}

async function openJoinModal(code) {
  const moim = await findMoimByCode(code);
  if (!moim) { alert('유효하지 않은 초대 코드예요'); return; }
  if (MyMoims.has(moim.id)) {
    MyMoims.add(moim.id);
    await loadMoims();
    navigate('detail', moim.id);
    return;
  }
  joiningMoim = moim;
  document.getElementById('join-moim-name').textContent = moim.name;
  document.getElementById('join-moim-sub').textContent = `멤버 ${moim.members.length}명 · ${moim.books.length}권 · ${moim.cycleDays}일 주기`;
  document.getElementById('join-name').value = '';
  closeModal('modal-enter-code');
  openModal('modal-join');
}

async function confirmJoin() {
  const name = document.getElementById('join-name').value.trim();
  if (!name) { alert('이름을 입력해주세요'); return; }
  if (!joiningMoim) return;

  const newMember = { id: uid(), name };
  joiningMoim.members.push(newMember);
  await upsertMoim(joiningMoim);
  MyMoims.add(joiningMoim.id);
  MyMember.set(joiningMoim.id, newMember.id);
  moims.unshift(joiningMoim);
  closeModal('modal-join');

  // URL 파라미터 제거
  history.replaceState({}, '', location.pathname);
  navigate('detail', joiningMoim.id);
  joiningMoim = null;
}

function openEnterCode() {
  document.getElementById('enter-code-input').value = '';
  openModal('modal-enter-code');
}

async function submitEnterCode() {
  const code = document.getElementById('enter-code-input').value.trim().toUpperCase();
  if (code.length !== 6) { alert('6자리 코드를 입력해주세요'); return; }
  await openJoinModal(code);
}

// ── 책 검색 (네이버 API) ─────────────────────────────────
let tmpSelectedBook = null;
let searchTimer = null;

function debounceSearch(query, resultsId, context) {
  clearTimeout(searchTimer);
  const el = document.getElementById(resultsId);
  if (!query.trim()) { el.classList.remove('open'); return; }
  el.innerHTML = '<div class="book-search-status">검색 중...</div>';
  el.classList.add('open');
  searchTimer = setTimeout(() => searchBooks(query, resultsId, context), 400);
}

async function searchBooks(query, resultsId, context) {
  const el = document.getElementById(resultsId);
  try {
    const res = await fetch(`/api/books?q=${encodeURIComponent(query)}`);
    const items = await res.json();
    if (!res.ok) throw new Error(items.error || '검색 실패');
    if (!items.length) {
      el.innerHTML = '<div class="book-search-status">검색 결과가 없어요</div>';
      return;
    }
    el.innerHTML = items.map((item, i) => {
      const title = item.title.replace(/<[^>]+>/g, '');
      const author = (item.author || '').replace(/<[^>]+>/g, '');
      const cover = item.image || '';
      return `<div class="book-result-item" onclick="selectBook(${i},'${resultsId}','${context}')" data-idx="${i}">
        ${cover
          ? `<img class="book-result-thumb" src="${cover}" alt="" />`
          : `<div class="book-result-thumb-empty">📖</div>`}
        <div class="book-result-info">
          <div class="book-result-title">${esc(title)}</div>
          <div class="book-result-author">${esc(author)}</div>
        </div>
      </div>`;
    }).join('');
    el._items = items;
  } catch (err) {
    el.innerHTML = `<div class="book-search-status" style="color:#c0392b">${esc(err.message)}</div>`;
  }
}

function selectBook(idx, resultsId, context) {
  const el = document.getElementById(resultsId);
  const raw = el._items?.[idx];
  if (!raw) return;
  const title = raw.title.replace(/<[^>]+>/g, '');
  const author = (raw.author || '').replace(/<[^>]+>/g, '');
  const cover = raw.image || '';
  tmpSelectedBook = { title, author, cover };
  el.classList.remove('open');

  if (context === 'moim') {
    document.getElementById('m-book-input').value = title;
    addBookToMoim();
  } else if (context === 'edit') {
    document.getElementById('eb-title').value = title;
    const sel = document.getElementById('eb-selected');
    sel.style.cssText = 'display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border-radius:8px;';
    sel.innerHTML = `
      ${cover ? `<img style="width:36px;height:52px;object-fit:cover;border-radius:4px" src="${cover}" />` : '<div style="font-size:24px">📖</div>'}
      <div>
        <div style="font-size:13.5px;font-weight:600">${esc(title)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(author)}</div>
      </div>`;
  } else {
    document.getElementById('ab-title').value = title;
    const sel = document.getElementById('ab-selected');
    sel.style.cssText = 'display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border-radius:8px;margin-bottom:16px;';
    sel.innerHTML = `
      ${cover ? `<img style="width:36px;height:52px;object-fit:cover;border-radius:4px" src="${cover}" />` : '<div style="font-size:24px">📖</div>'}
      <div>
        <div style="font-size:13.5px;font-weight:600">${esc(title)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(author)}</div>
      </div>`;
  }
}

function handleSearchKey(e, resultsId, context) {
  if (e.key === 'Escape') {
    document.getElementById(resultsId).classList.remove('open');
  }
}


// ── 유틸 ────────────────────────────────────────────────
function nextExchangeDday(m) {
  if (!m.lastExchangeDate || !m.cycleDays) return { label: '주기 없음', n: 999 };
  const last = new Date(m.lastExchangeDate);
  const next = new Date(last);
  next.setDate(next.getDate() + m.cycleDays);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.ceil((next - today) / 86400000);
  if (diff < 0) return { label: `D+${Math.abs(diff)} 지남`, n: 0 };
  if (diff === 0) return { label: '오늘 교환일', n: 0 };
  return { label: `교환까지 D-${diff}`, n: diff };
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function fmtDate(str) {
  if (!str) return '—';
  return str.replace(/-/g, '.').slice(0, 10);
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeBackdrop(e, id) { if (e.target.classList.contains('modal-backdrop')) closeModal(id); }

// ── 초기 실행 ────────────────────────────────────────────
async function initApp() {
  document.getElementById('home-grid').innerHTML = '<div style="color:var(--muted);font-size:13px;padding:40px 0">불러오는 중...</div>';

  // 초대 링크 감지 (?join=CODE)
  const joinCode = new URLSearchParams(location.search).get('join');
  if (joinCode) {
    await openJoinModal(joinCode);
    return;
  }

  await loadMoims();
  document.getElementById('cnt-moim').textContent = moims.filter(m => m.status === '진행중').length;
  renderHome();
}

initApp();
